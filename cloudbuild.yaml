steps:
  # Build container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/next-live/next-live-agent:$COMMIT_SHA', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/next-live/next-live-agent:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'next-live-agent'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/next-live/next-live-agent:$COMMIT_SHA'
      - '--region=us-central1'
      - '--timeout=3600'
      - '--cpu=2'
      - '--memory=4Gi'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--concurrency=80'
      - '--no-cpu-throttling'
      - '--session-affinity'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=True'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/next-live/next-live-agent:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
